services:
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/recruitflow.db
      RESUME_INBOX_DIR: /app/data/resume_inbox
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: /backend
    environment:
      BACKEND_PROXY_TARGET: http://backend:8000
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      - backend
